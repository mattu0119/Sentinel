name: Deploy Content to sentinel-eus2 [8850ac66-9be9-4089-8a6f-29fb6ee32c44]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-8850ac66-9be9-4089-8a6f-29fb6ee32c44.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-8850ac66-9be9-4089-8a6f-29fb6ee32c44.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'rg-hub-sentinel'
      workspaceName: 'sentinel-eus2'
      workspaceId: 'cd15d437-fd75-4d40-bae9-60b287cbca27'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule,AutomationRule,HuntingQuery,Parser,Playbook,Workbook,Solution'
      branch: 'main'
      sourceControlId: '8850ac66-9be9-4089-8a6f-29fb6ee32c44'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_8850ac669be940898a6f29fb6ee32c44 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_8850ac669be940898a6f29fb6ee32c44 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_8850ac669be940898a6f29fb6ee32c44 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_8850ac669be940898a6f29fb6ee32c44 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_8850ac669be940898a6f29fb6ee32c44 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_8850ac669be940898a6f29fb6ee32c44 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_8850ac669be940898a6f29fb6ee32c44 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_8850ac669be940898a6f29fb6ee32c44 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_8850ac669be940898a6f29fb6ee32c44 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-8850ac66-9be9-4089-8a6f-29fb6ee32c44.ps1